<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    >
    <title>Solar System</title>
    <style>
    html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

#c {
  width: 100%;
  height: 100%;
  display: block;
}

.date-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: absolute;
  left: 50%;
  bottom: 3vh;
  transform: translateX(-50%);
  width: 100%;
  color: white;
  z-index: 100;
}

.date-text {
  margin: 0 0 5px 0;
  text-align: center;
}

.date-slider {
  -webkit-appearance: none;
  appearance: none;
  height: 7px;
  width: 80vw;
  top: 0;
  opacity: 0.7;
  background: linear-gradient(
    to left,
    rgba(255,255,255,0) 0%,
    rgb(142,142,142) 10%,
    rgba(142,142,142,1) 90%,
    rgba(255,255,255,0) 100%
  );
}

.date-slider:hover {
  opacity: 1;
}

.date-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #c6c6c6;
  cursor: pointer;
}

.reset-date-button {
  font-size: clamp(.85rem, .9vw, 1rem);
  color: white;
  border-radius: 10px;
  margin: 15px 0 0 0;
  border: none;
  height: 40px;
  width: 140px;
  background: rgba(15,15,15,0.6);
}

.reset-date-button:hover {
  background: rgba(15,15,15,1);
}

.heavenly-body-info-container {
  display: none;
  flex-direction: column;
  background-color: rgb(15,15,15);
  position: absolute;
  padding: 1vh;
  right: 0;
  width: min(360px, 40vw);
  margin: 1vh;
  margin-top: 1.5vh;
  border-radius: 8px;
  z-index: 100;
  display: none;
}

.heavenly-body-name {
  position: relative;
  font-weight: bold;
  color: white;
  padding-bottom: 0.7vh;
  font-size: clamp(1.2rem, 2vw, 1.5rem);
}

.heavenly-body-info {
  position: relative;
  color: white;
  font-size: clamp(.9rem, 1vw, 1rem);
}

.neo-card-container {
  display: flex;
  flex-direction: column;
  background-color: rgba(15,15,15,0.7);
  position: absolute;
  color: white;
  left: 0;
  width: 330px;
  max-height: 70vh;
  margin: 1vh;
  margin-top: 1.5vh;
  border-radius: 8px;
  overflow-y: auto;
  overflow-x: auto;
  z-index: 100;

  -webkit-mask-image: linear-gradient(
    to bottom,
    black 0%,
    black 80%,
    transparent 100%
  );

  mask-image: linear-gradient(
    to bottom,
    black 0%,
    black 80%,
    transparent 100%
  );

  -ms-overflow-style: none;
  scrollbar-width: none;
}

.neo-card-container::-webkit-scrollbar {
  display: none;
}

.neo-card {
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
  background-color: rgba(15,15,15,0.7);
}

.neo-name {
  font-size: clamp(1rem, 1.2vw, 1.2rem);
  margin: 0 0 5px 0;
}

.neo-card-list {
  margin: 10px;
  gap: 10px;
}

.neo-card-container-heading {
  position:sticky;
  top: 0;
  font-size: clamp(1rem, 1.2vw, 1.2rem);
  display: flex;
  align-items: center;
  justify-content:center;
  gap: 1rem;
  padding: 1vh 1vh 1vh 1vh;
  background-color: rgba(15,15,15,1);
  box-shadow: 0 8px 12px -6px rgba(0, 0, 0, 0.7);
}

.neo-card-container-heading p {
  margin: 0;
}

.neo-date-selector {
  all: unset;
  color-scheme: dark;
  font-size: clamp(.85rem, .9vw, 1rem);
  padding: .5rem 0.8rem .5rem 0.8rem;
  height: 22px;
  color: white;
  background: rgb(40, 40, 40);
  border-radius: 8px;
}

@media (max-width: 1024px) {

  .neo-card-container {
    flex-direction: column;
    width: calc(100vw - 1rem);
    height: 25vh;
    overflow: hidden;
  }
  .neo-card-list {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    width: 100%;
    -webkit-overflow-scrolling: touch;
  }

  .neo-card-list::-webkit-scrollbar {
    display: none;
  }

  .neo-card {
    flex: 0 0 260px;
    margin: 0;
  }

  .date-container {
    width: 80vw;
  }

  .heavenly-body-info-container {
    bottom: 14vh;
    left: 0;
    width: calc(100vw - 2rem);
  }

  .date-slider {
    width: 90vw;
  }

}
    </style>
  </head>
  <body>
    <div id = 'date-container' class = 'date-container'>
      <p id = 'date-text' class = 'date-text'></p>
      <input id = 'date-slider' class = "date-slider" type = "range"  min="-365" max="365" value="0">
      <button id = 'reset-date-button' class = 'reset-date-button'>Back to Today</button>
    </div>
    <div id = 'heavenly-body-info-container' class = 'heavenly-body-info-container'>
      <div id = 'heavenly-body-name' class = 'heavenly-body-name'></div>
      <div id = 'heavenly-body-info' class='heavenly-body-info'></div>
    </div>
    <div id="neo-card-container" class="neo-card-container">
      <div id = "neo-card-container-heading" class = "neo-card-container-heading">
        <p>NEOs approaching on </p>
        <input id = 'neo-date-selector' class = 'neo-date-selector' type = 'date'>
      </div>
      <div id="neo-card-list" class="neo-card-list"></div>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
