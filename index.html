<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Solar System</title>
    <style>
    html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    }
    #c {
      width: 100%;
      height: 100%;
      display: block; /* Since default inline element can add whitespace */
    }
    .asteroid-name {
      position: absolute;
      z-index: 100;
      font-weight: bold;
      color: white;
      font-size: 2rem;
    }
    .heavenly-body-info-container {
      display: flex;
      flex-direction: column;
      background-color: rgb(12, 10, 40);
      position: absolute;
      bottom: 0;
      padding: 1.5dvh;
      width: 50vh;
      margin: 2dvh;
      border-radius: 10px;
      z-index: 100;
      display: none;
    }
    .heavenly-body-name {
      position: relative;
      font-weight: bold;
      color: white;
      padding-bottom: 1dvh;
      font-size: 2rem;
    }
    .heavenly-body-info {
      position: relative;
      color: white;
      font-size: 1.2rem;
    }
    .asteroid-form {
      display: flex;
      flex-direction: column;
      position: absolute;
      right: 0;

    }
    </style>
  </head>
  <body>
    <div id = 'asteroid-name' class = 'asteroid-name'>ASTEROID</div>
    <div id = 'heavenly-body-info-container' class = 'heavenly-body-info-container'>
      <div id = 'heavenly-body-name' class = 'heavenly-body-name'></div>
      <div id = 'heavenly-body-info' class='heavenly-body-info'></div>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
