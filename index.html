<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    >
    <title>Solar System</title>
    <style>
    html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    }
    #c {
      width: 100%;
      height: 100%;
      display: block; /* Since default inline element can add whitespace */
    }
    .date-container {
      display: flex;
      align-items: center;
      flex-direction:column;
      position: absolute;
      color: white;
      top: 88%;
      left: 50%;
      width: 80%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      z-index: 100;
    }
    .date-text {
      position: relative;
      margin: 0 0 8px 0;
      text-align: center;
    }
    .date-slider {
      -webkit-appearance: none;
      appearance: none;
      position: relative;
      height: 10px;
      width: 100%;
      top: 0;
      opacity: 0.7;
      background: linear-gradient(
      to left,
      rgba(255, 255, 255, 0) 0%,
      rgb(142, 142, 142) 10%,
      rgba(142, 142, 142, 1) 90%,
      rgba(255, 255, 255, 0) 100%);
    }
    .date-slider:hover {
      opacity: 1;
    }
    .date-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      border-radius: 50px;
      background: #c6c6c6;
      cursor: pointer;
    }
    .reset-date-button {
      font-size:1.1rem;
      color: white;
      border-radius: 15px;
      margin: 10px 0 0 0;
      border: none;
      height: 45px;
      width: 200px;
      background: rgba(15, 15, 15, 0.6);
    }
    .reset-date-button:hover {
      background: rgba(15, 15, 15, 1);
    }
    .heavenly-body-info-container {
      display: flex;
      flex-direction: column;
      background-color: rgb(15, 15, 15);
      position: absolute;
      padding: 1.5dvh;
      right:0;
      width: 50vh;
      margin: 1.5dvh;
      margin-top: 2dvh;
      border-radius: 10px;
      z-index: 100;
      display: none;
    }
    .heavenly-body-name {
      position: relative;
      font-weight: bold;
      color: white;
      padding-bottom: 1dvh;
      font-size: 2rem;
    }
    .heavenly-body-info {
      position: relative;
      color: white;
      font-size: 1.2rem;
    }
    .neo-card-container {
      display: flex;
      flex-direction: column;
      background-color: rgba(15, 15, 15, 0.7);
      position: absolute;
      color:white;
      padding: 1.5dvh 1.5dvh 5dvh 1.5dvh;
      left:0;
      width: 43dvh;
      max-height:75%;
      margin: 1.5dvh;
      margin-top: 2dvh;
      border-radius: 10px;
      overflow: auto;
      z-index: 100;
      -webkit-mask-image: linear-gradient(
        to bottom,
        black 0%,
        black 80%,
        transparent 100%
      );

      mask-image: linear-gradient(
          to bottom,
          black 0%,
          black 80%,
          transparent 100%
      );
    }
    .neo-card {
      margin: 10px 0 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: rgba(15, 15, 15, 1);
    }
    .neo-name {
      font-size: 1.5rem;
      margin: 0 0 8px 0;
    }
    .neo-card-container-heading {
      font-size: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .neo-card-container {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    .neo-card-container::-webkit-scrollbar { 
        display: none;
    }
    .neo-card-container-heading p {
      margin: 0;
    }
    .neo-date-selector {
      all: unset;
      color-scheme: dark;
      font-size: 1.2rem;
      padding: 1dvh;
      height: 30px;
      color:white;
      background: rgba(15, 15, 15, 1);
      border-radius: 10px;
    }
    </style>
  </head>
  <body>
    <div id = 'date-container' class = 'date-container'>
      <p id = 'date-text' class = 'date-text'></p>
      <input id = 'date-slider' class = "date-slider" type = "range"  min="-365" max="365" value="0">
      <button id = 'reset-date-button' class = 'reset-date-button'>Back to Today</button>
    </div>
    <div id = 'heavenly-body-info-container' class = 'heavenly-body-info-container'>
      <div id = 'heavenly-body-name' class = 'heavenly-body-name'></div>
      <div id = 'heavenly-body-info' class='heavenly-body-info'></div>
    </div>
    <div id="neo-card-container" class="neo-card-container">
      <div id = "neo-card-container-heading" class = "neo-card-container-heading">
        <p>NEOs approaching on </p>
        <input id = 'neo-date-selector' class = 'neo-date-selector' type = 'date'>
      </div>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
