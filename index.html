<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Solar System</title>
    <style>
    html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    }
    #c {
      width: 100%;
      height: 100%;
      display: block; /* Since default inline element can add whitespace */
    }
    .date-container {
      position: absolute;
      color: white;
      top: 90%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      z-index: 100;
    }
    .heavenly-body-info-container {
      display: flex;
      flex-direction: column;
      background-color: rgb(15, 15, 15);
      position: absolute;
      padding: 1.5dvh;
      right:0;
      width: 50vh;
      margin: 1.5dvh;
      margin-top: 2dvh;
      border-radius: 10px;
      z-index: 100;
      display: none;
    }
    .heavenly-body-name {
      position: relative;
      font-weight: bold;
      color: white;
      padding-bottom: 1dvh;
      font-size: 2rem;
    }
    .heavenly-body-info {
      position: relative;
      color: white;
      font-size: 1.2rem;
    }
    .slider-container{
      top: 93%;
      left: 20%;
      width: 100%;
      position: absolute;
      z-index: 100;
    }
    .slider {
      -webkit-appearance: none;
      appearance: none;
      position: relative;
      width: 60%;
      height: 10px;
      opacity: 0.7;
      background: linear-gradient(
      to left,
      rgba(255, 255, 255, 0) 0%,
      rgb(142, 142, 142) 10%,
      rgba(142, 142, 142, 1) 90%,
      rgba(255, 255, 255, 0) 100%);
    }
    .slider:hover {
      opacity: 1;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      border-radius: 50px;
      background: #ff9100;
      cursor: pointer;
    }
    
    </style>
  </head>
  <body>
    <div id = 'date-container' class = 'date-container'></div>
    <div id = 'heavenly-body-info-container' class = 'heavenly-body-info-container'>
      <div id = 'heavenly-body-name' class = 'heavenly-body-name'></div>
      <div id = 'heavenly-body-info' class='heavenly-body-info'></div>
    </div>
    <div id = 'slider-container' class = 'slider-container'>
      <input class = "slider" type = "range"  min="1" max="100" value="50">
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
